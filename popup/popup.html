<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Productivity</title>
    <link rel="stylesheet" href="popup.css" />
    <script src="popup.js"></script>
  </head>
  <body class="dark-mode">
    <div class="popup-container">
      <div id="login-view">
        <h3>Login to GitHub</h3>
        <input
          type="password"
          class="token-input"
          id="login-input"
          placeholder="Enter GitHub token"
        />
        <button class="save-token-look save-token link-buttons" id="login-button">Save Token</button>
      </div>

      <div id="main-view">
        <div id="header">
          <div id="dropdown-wrapper">
            <button id="menu-btn" class="symbol-button">
              <span class="symbol-icon dark-mode">☰</span>
            </button>
            <div class="center-aligned dark-mode" id="button-nav">
              <button class="link-buttons nav-buttons" id="repo">
                Repositories
              </button>
              <button class="link-buttons nav-buttons" id="star">Starred</button>
              <button class="link-buttons nav-buttons" id="gist">Gists</button>
              <button class="link-buttons nav-buttons" id="noti">
                Notifications
              </button>
            </div>
          </div>
          <span class="title" style="margin-left: 10px">GitHub Productivity</span>
        </div>
        <hr />

        <div id="user-info dark-mode">
          <div id="user-name" class="center-aligned">
            <img src="" alt="Avatar" id="avatar" />
            <span id="user"></span>
          </div>
          <div id="user-stats" class="center-aligned">
            <span id="repos"></span>
            <span id="notis"></span>
          </div>
        </div>
        <hr />

        <div class="center-aligned" id="top-repos"></div>

        <hr />

        <div class="center-aligned" id="footer">
          <button id="refresh" class="footer-button link-buttons">
            ⟳ Refresh
          </button>
          <button id="settings" class="footer-button link-buttons">
            ⚙ Settings
          </button>
        </div>
      </div>

      <div id="settings-view" style="display: none">
        <div id="settings-container" class="dark-mode">
          <div id="settings-header" class="center-aligned">
            <button class="symbol-button" id="settings-back">
              <span class="symbol-icon">←</span>
            </button>
            <span class="title">⚙ Settings</span>
          </div>
          <div id="bottom-settings">
            <hr />

            <div class="center-aligned" id="update-token">
              <label for="token-reinput">Update Token</label>
              <input
                type="password"
                class="token-input"
                id="settings-input"
                placeholder="Enter GitHub token"
              />
              <button class="save-token-look save-token link-buttons" id="settings-button" style="margin-top: 1vh;">Save Token</button>
            </div>

            <hr />

            <div class="center-aligned" style="flex-direction: column">
              <div>Light Mode</div>
              <input type="checkbox" id="light-mode-box"/>
            </div>

            <hr />

            <div class="center-aligned" id="repo-preferences">
              <label>Main Repo Selector</label>
              <div id="repo-filters">
                <div id="org-dropdown-wrapper">
                  <button id="org-dropdown-btn" class="filter-dropdown-btn">Personal only</button>
                  <div id="org-dropdown-menu" class="dropdown-menu">
                    <label class="org-option">
                      <input type="checkbox" id="include-personal" checked/>
                      Personal
                    </label>
                    <div id="org-list"></div>
                  </div>
                </div>
                <select id="visibility-filter">
                  <option value="all">All</option>
                  <option value="public">Public</option>
                  <option value="private">Private</option>
                </select>
                <button id="load-repos-btn" class="link-buttons">Load</button>
              </div>
              <div
                id="repo-list"
                style="max-height: 25vh; overflow-y: auto"
              ></div>
            </div>

            <hr />

            <div class="center-aligned" id="clear-cache">
              <button class="save-token-look link-buttons">Clear Cache</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Repo Detail View (slides in from right) -->
      <div id="repo-detail-view">
        <div id="repo-detail-container" class="dark-mode">
          <div id="repo-detail-header">
            <button class="symbol-button" id="repo-detail-close">
              <span class="symbol-icon">✕</span>
            </button>
            <span class="title" id="repo-detail-title">Repo Name</span>
          </div>
          <hr />
          <div id="repo-detail-content">
            <div id="repo-stats">
              <div class="stat-row">
                <span class="stat-label">⭐ Stars</span>
                <span class="stat-value" id="stat-stars">--</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">🍴 Forks</span>
                <span class="stat-value" id="stat-forks">--</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">👁 Watchers</span>
                <span class="stat-value" id="stat-watchers">--</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">🔓 Open Issues</span>
                <span class="stat-value" id="stat-issues">--</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">📅 Last Updated</span>
                <span class="stat-value" id="stat-updated">--</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">📊 Open PRs</span>
                <span class="stat-value" id="stat-prs">--</span>
              </div>
            </div>
            <hr />
            <button id="repo-link-btn" class="link-buttons">Open on GitHub →</button>
          </div>
        </div>
      </div>

      <!-- Error Toast -->
      <div id="error-toast" class="hidden">
        <span id="error-message"></span>
        <button id="error-close">✕</button>
      </div>
    </div>
  </body>
</html>
